name: Deploy Landing Page

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN_AV }}

      - name: Construir imagen Docker
        run: |
          docker build -t ghcr.io/gasper08/proyecto:3.0.0 .

      - name: Publicar imagen
        run: |
          docker push ghcr.io/gasper08/proyecto:3.0.0

      - name: Copiar archivos al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "stack.yml"
          target: "/home/${{ secrets.VPS_USER }}/landingb"

      - name: Desplegar servicios
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e

            echo "===== Docker ====="
            docker --version

            if ! docker info | grep -q "Swarm: active"; then
              echo "Inicializando Docker Swarm..."
              docker swarm init || true
            fi

            mkdir -p ~/landingb

            cd ~/landingb

            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.TOKEN_AV }}

            docker pull ghcr.io/gasper08/proyecto:3.0.0

            docker network inspect traefik-public >/dev/null 2>&1 || \
            docker network create --driver overlay traefik-public

            docker stack deploy -c stack.yml borrar

            docker service ls

            docker stack ls