name: tarea3.0

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Construir imagen
        run: docker build -t ghcr.io/gasper08/proyecto:3.0.0 .

      - name: Login GHCR
        run: echo "${{ secrets.TOKEN_AV }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push imagen
        run: docker push ghcr.io/gasper08/proyecto:3.0.0

      - name: Probar variables
        run: |
          echo "Host: ${{ secrets.VPS_HOST }}"
          echo "User: ${{ secrets.VPS_USER }}"
          echo "Port: ${{ secrets.VPS_SSH_PORT }}"

      - name: Probar conexión SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "Conexión SSH exitosa"
            touch ejemplo.txt

      - name: Copiar archivos al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "stack.yml,Makefile"
          target: "/home/${{ secrets.VPS_USER }}/landingb"

      - name: Desplegar en servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e

            echo "Desplegando servicios"

            cd ~/landingb || exit 1

            docker pull ghcr.io/gasper08/proyecto:3.0.0

            docker stack deploy -c stack.yml borrar