version: '3.9'

services:
joel:
 imagen: ghcr.io/gasper08/proyecto:3.0.0        
 networks:
   -traefik-public 
   deploy: 
   replicas:1
   update_confing:
   parallelism:1
   delay:10s
   restart_policy:
     condition: on-failure
     labels:
        - "traefik.enable=true"
        - "traefik.http.routers.joel.entrypoints=http"
        - "traefik.http.routers.joel.rule=Host(joel.byronrm.com)"
        - "traefik.http.middlewares.joel-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.joel.middlewares=joel-https-redirect"
        - "traefik.http.routers.joel-secure.entrypoints=https"
        - "traefik.http.routers.joel-secure.rule=Host(joel.byronrm.com)"
        - "traefik.http.routers.joel-secure.tls=true"
        - "traefik.http.routers.joel-secure.tls.certresolver=http"
        - "traefik.http.routers.joel-secure.service=joel"
        - "traefik.http.services.joel.loadbalancer.server.port=5000"
        - "traefik.docker.network=traefik-public"
        networks:
          traefik-public:
          external: true